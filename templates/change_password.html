{% extends 'base.html' %}
{% block title %}Change Password — Support Desk{% endblock %}

{% block content %}
<section class="auth-wrap">
  <div class="auth-card">
    <p class="eyebrow">Account Settings</p>
    <h2>Change Password</h2>
    <p class="auth-sub">Your email address cannot be changed. Only your password can be updated here.</p>

    <form method="POST" class="form">
      <label for="current_password">Current Password</label>
      <input type="password" id="current_password" name="current_password" required>

      <label for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password" placeholder="At least 6 characters" required minlength="6">

      <label for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required minlength="6">

      <button type="submit" class="btn btn-primary btn-block">Update Password</button>
    </form>
  </div>
</section>
{% endblock %}
